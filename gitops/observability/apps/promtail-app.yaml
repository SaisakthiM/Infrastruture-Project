apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: promtail
      targetRevision: 6.16.6 # TODO: confirm against `helm search repo promtail --versions` and pin deliberately
      helm:
        valueFiles:
          - $values/Projects/Finished Projects/Docker/Terraform/infra/projects/platform/observability/promtail-config.yml
    - repoURL: git@github.com:SaisakthiM/Coding-Project.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

# Heads up: the promtail chart itself is in maintenance mode upstream;
# Grafana's official guidance is to move to Grafana Alloy when you get a
# chance. Not changing that here since it's outside scope, just flagging it.
