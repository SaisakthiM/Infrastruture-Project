apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3 # TODO: confirm against `helm search repo ingress-nginx --versions` and pin deliberately
    helm:
      values: |
        controller:
          service:
            type: NodePort
            nodePorts:
              http: "30080"
          hostPort:
            enabled: true
            ports:
              http: 80
          metrics:
            enabled: true
            port: 10254
            service:
              annotations:
                prometheus.io/scrape: "true"
                prometheus.io/port: "10254"
            serviceMonitor:
              enabled: false
              namespace: monitoring
              interval: 30s
              additionalLabels:
                release: kube-prometheus-stack
            prometheusRule:
              enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true