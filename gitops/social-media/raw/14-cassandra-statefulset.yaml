apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: default
spec:
  serviceName: cassandra
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
    spec:
      initContainers:
        - name: increase-vm-max-map-count
          image: busybox
          imagePullPolicy: IfNotPresent
          command: ["sysctl", "-w", "vm.max_map_count=1048575"]
          securityContext:
            privileged: true
      containers:
        - name: cassandra
          image: cassandra:5.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9042
              name: cql
          env:
            # 1. Increased heap size to match allocated memory limits cleanly
            - name: MAX_HEAP_SIZE
              value: "1024M"
            - name: HEAP_NEWSIZE
              value: "256M"
            - name: CASSANDRA_CLUSTER_NAME
              value: "cassandra-cluster"
          resources:
            requests:
              memory: "1536Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          # 2. Replaced heavy CLI execution probes with lightweight TCP port checks
          readinessProbe:
            tcpSocket:
              port: 9042
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 9042
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
