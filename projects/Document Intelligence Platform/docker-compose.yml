services:

  # ─── MySQL Database ───────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: document-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: saisakthi2008
      MYSQL_DATABASE: book_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psaisakthi2008"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - document-network

  # ─── MinIO Object Storage ─────────────────────────────────────────
  minio:
    image: quay.io/minio/minio
    container_name: document-server
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - document-network

  # ─── Django Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend/document_backend
      dockerfile: Dockerfile
    container_name: document-backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - document-network
    extra_hosts:
    - "host.docker.internal:host-gateway"

  # ─── Vite / React Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/document_frontend
      dockerfile: Dockerfile
    container_name: document-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - document-network

# ─── Volumes ──────────────────────────────────────────────────────────
volumes:
  mysql_data:
  minio_data:

# ─── Network ──────────────────────────────────────────────────────────
networks:
  document-network:
    driver: bridge