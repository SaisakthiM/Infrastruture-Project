kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: social-media
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 30317
        hostPort: 30317
        protocol: TCP
      - containerPort: 30318
        hostPort: 30318
        protocol: TCP
  - role: worker
    labels:
      tier: app
  - role: worker
    labels:
      tier: services