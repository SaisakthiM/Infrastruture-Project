server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    server_name localhost saisakthi.qzz.io;
    client_max_body_size 1000M;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://static.cloudflareinsights.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: http:;" always;

    server_tokens off;
    resolver 127.0.0.11 valid=30s;

    ssl_certificate     /etc/letsencrypt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    

    # ─── NOTES ────────────────────────────────────────────────────
    location /notes/api/ {
        set $notes_backend "notes-backend:8000";
        rewrite ^/notes/api/(.*)$ /api/$1 break;
        proxy_pass http://$notes_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location /notes/ {
        root /apps;
        try_files $uri $uri/ /notes/index.html;
    }

    # ─── Whisper ────────────────────────────────────────────────────

    location /whisper/api/ {
        set $whisper_backend "whisper_backend:8000";
        rewrite ^/whisper/api/(.*)$ /$1 break; 
        proxy_pass http://$whisper_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location /whisper/ {
        root /apps;
        try_files $uri $uri/ /whisper/index.html;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data: blob: https: http: http://whisper-backend/;" always;
    }

    location /whisper/ws/ {
        set $whisper_backend "whisper_backend:8000";
        rewrite ^/whisper/ws/(.*)$ /ws/$1 break;
        proxy_pass http://$whisper_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;  # keep WS alive
    }


    # ─── N8N ──────────────────────────────────────────────────────
    location /n8n/ {
        proxy_pass http://n8n:5678/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # CSP tuned for n8n frontend
        add_header Content-Security-Policy "
            default-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data:;
            script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data: https://static.cloudflareinsights.com;
            style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
            font-src 'self' https://fonts.gstatic.com data:;
            img-src 'self' data: blob: https: http:;
            connect-src 'self' ws: wss: https: http:;
            worker-src 'self' blob:;
        " always;

        proxy_read_timeout 86400;

        error_page 502 503 504 = @service_unavailable;
    }

    location @service_unavailable {
        default_type application/json;
        return 404 '{"error": "service unavailable"}';
    }

    # Explicit asset handling
    location /n8n/assets/ {
        proxy_pass http://n8n:5678/assets/;
    }
    location /n8n/static/ {
        proxy_pass http://n8n:5678/static/;
    }

    # Health check endpoint
    location /n8n/rest/health {
        proxy_pass http://n8n:5678/rest/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }


    # ─── BANK ─────────────────────────────────────────────────────
    location /bank/api/ {
        set $bank_backend "bank-backend:8080";
        rewrite ^/bank/api/(.*)$ /api/$1 break;
        proxy_pass http://$bank_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location /bank/ {
        root /apps;
        try_files $uri $uri/ /bank/index.html;
    }

    # ─── QUIZ ─────────────────────────────────────────────────────
    location /quiz/ {
        root /apps;
        try_files $uri $uri/ /quiz/index.html;
    }

    # ─── VIDEO ────────────────────────────────────────────────────
    location /video/api/ {
        set $video_backend "video-uploader-backend:8080";
        rewrite ^/video/api/(.*)$ /$1 break;
        proxy_pass http://$video_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location /video/ {
        root /apps;
        try_files $uri $uri/ /video/index.html;
    }

    # ─── HOSPITAL ─────────────────────────────────────────────────
    location /hospital/ {
        set $hospital_backend "hospital-management:8000";
        rewrite ^/hospital/(.*)$ /hospital/$1 break;
        proxy_pass http://$hospital_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    # ─── BLOG ─────────────────────────────────────────────────────
    location /blog/ {
        set $blog_backend "blog-website:8000";
        rewrite ^/blog/(.*)$ /blog/$1 break;
        proxy_pass http://$blog_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://static.cloudflareinsights.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: http:;" always;
    }

    location /accounts/login/ {
        return 302 /blog/login/;
    }

    location /accounts/logout/ {
        return 302 /blog/logout/;
    }

    # ─── BLOG MINIO ───────────────────────────────────────────────
    location /blog/minio/ {
        set $blog_minio "blog-minio:9000";
        rewrite ^/blog/minio/(.*)$ /$1 break;
        proxy_pass http://$blog_minio;
        proxy_set_header Host blog-minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 1000M;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── SOCIAL MEDIA (Kubernetes via kind) ───────────────────────
    location /social/ {
        set $social_upstream "social-media-control-plane:30080";
        proxy_pass http://$social_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
        proxy_redirect off;

        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRFToken" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRFToken";
            return 204;
        }
    }

    # ─── COMPILER SERVICE ──────────────────────────────────────────────

    

    # location /compiler/api/ {
    #     proxy_pass         http://compiler-server:9090/;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;

    #     # Code execution can take a few seconds
    #     proxy_read_timeout 30s;
    #     proxy_send_timeout 30s;
    # }

    # ─── API SERVICE ──────────────────────────────────────────────
    location /api-service/api/ {
        set $api_service_backend "api-service-backend:8000";
        rewrite ^/api-service/api/(.*)$ /$1 break;
        proxy_pass http://$api_service_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location /api-service/ {
        root /apps;
        try_files $uri $uri/ /api-service/index.html;
    }

    # ─── DOCUMENT INTELLIGENCE PLATFORM ──────────────────────────
    location /document/api/ {
        set $doc_backend "doc-backend:8000";
        rewrite ^/document/api/(.*)$ /$1 break;
        proxy_pass http://$doc_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /document/ {
        root /apps;
        try_files $uri $uri/ /document/index.html;
    }

    # ─── OBSERVABILITY ────────────────────────────────────────────
    location /grafana/ {
        set $obs_upstream "social-media-control-plane:30080";
        proxy_pass http://$obs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_redirect off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https: http:; connect-src 'self' ws: wss:;" always;
    }

    location /jaeger/ {
        set $obs_upstream "social-media-control-plane:30080";
        proxy_pass http://$obs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 60s;
        proxy_redirect off;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self' http: https:;" always;
    }

    location /otel/ {
        set $obs_upstream "social-media-control-plane:30080";
        proxy_pass http://$obs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
        proxy_redirect off;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, traceparent, tracestate" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, traceparent, tracestate";
            return 204;
        }
    }

    # ─── ARGOCD ───────────────────────────────────────────────────
    location /argocd/ {
        set $obs_upstream "social-media-control-plane:30080";
        proxy_pass http://$obs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 60s;
        proxy_redirect off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self' ws: wss:;" always;
        error_page 502 503 504 = @service_unavailable;
    }

    # ─── ATLANTIS ─────────────────────────────────────────────────
    location /atlantis/ {
        set $atlantis_backend "atlantis:4141";
        rewrite ^/atlantis/(.*)$ /$1 break;
        proxy_pass http://$atlantis_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # plan/apply can run long
        proxy_send_timeout 300s;
        proxy_redirect off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";  # Atlantis uses SSE for live logs

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:;" always;
    }

    location ~ ^/argocd/argocd(/.*)?$ {
        return 302 /argocd$1$is_args$args;
    }

    # ─── JENKINS ──────────────────────────────────────────────────
    location /jenkins/ {
        set $jenkins_backend "jenkins:8080";
        proxy_pass http://$jenkins_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_read_timeout 60s;
        proxy_redirect http://jenkins:8080/jenkins/ https://saisakthi.qzz.io/jenkins/;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
    }

    location /record/ {
        root /apps/record;
        try_files $uri $uri/ /record.html =404;
    }

    location /login {
        return 302 /social/login/;
    }

    location /register {
        return 302 /social/register/;
    }

    location / {
        root /apps/intro;
        try_files $uri $uri/ /intro/index.html =404;
    }
    
}

# ─── Internal :8080 — nginx_status for nginx-exporter only ───
server {
    listen 8080;
    server_name localhost;
    server_tokens off;

    location /nginx_status {
        stub_status on;
        access_log off;
        allow all;
    }

    location / {
        return 404;
    }
}